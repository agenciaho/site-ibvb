server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /admin {
        try_files /painel.html =404;
    }

    location ^~ /admin/ {
        try_files /painel.html =404;
    }

    location = /conteudo.json {
        add_header Cache-Control "public, max-age=60" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }
}

